name: Build & Release MemoirOS APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ANDROID_COMPILE_SDK: 36
  ANDROID_TARGET_SDK: 36
  JAVA_VERSION: 17

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # Java 17
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      # =========================
      # Android SDK
      # =========================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-36"
          sdkmanager "build-tools;36.0.0"

      # =========================
      # Flutter
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # =========================
      # Debug Environment
      # =========================
      - name: Environment Info
        run: |
          flutter doctor -v
          java -version
          sdkmanager --list | grep "android-36" || true

      # =========================
      # Update Version
      # =========================
      - name: Update Version
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER=$GITHUB_RUN_NUMBER
          sed -i "s/^version: .*/version: $APP_VERSION+$BUILD_NUMBER/" pubspec.yaml

      # =========================
      # Pub Get
      # =========================
      - name: Flutter Pub Get
        run: flutter pub get

      # =========================
      # Fix Isar Manifest
      # =========================
      - name: Patch Isar Manifest
        run: |
          find ~/.pub-cache \
            -path "*/isar_flutter_libs-*/android/src/main/AndroidManifest.xml" \
            -exec sed -i 's/package="dev.isar.isar_flutter_libs"//g' {} +

      # =========================
      # Fix Isar Namespace + Force compileSdk to 36
      # =========================
      - name: Patch Isar Android Build
        run: |
          ISAR_FILE=$(find ~/.pub-cache -path "*/isar_flutter_libs-*/android/build.gradle" | head -1)
          
          echo "Found: $ISAR_FILE"
          
          if [ -f "$ISAR_FILE" ]; then
            # Force replace existing compileSdkVersion with 36
            sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 36/g' "$ISAR_FILE"
            
            # Add namespace if missing
            grep -q "namespace" "$ISAR_FILE" || sed -i '/android {/a\    namespace "dev.isar.isar_flutter_libs"' "$ISAR_FILE"
            
            echo "===== Patched Isar ====="
            cat "$ISAR_FILE"
          else
            echo "Isar build.gradle not found!"
          fi

      # =========================
      # Verify Isar
      # =========================
      - name: Verify Isar Config
        run: |
          find ~/.pub-cache \
            -path "*/isar_flutter_libs-*/android/build.gradle" \
            -exec cat {} \;

      # =========================
      # Decode Keystore
      # =========================
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-key.jks

      # =========================
      # Clean
      # =========================
      - name: Clean Project
        run: |
          flutter clean
          flutter pub get

      # =========================
      # Verify Android SDK
      # =========================
      - name: Verify Android Config
        run: |
          echo "===== compileSdk ====="
          grep -R "compileSdk" android/

          echo "===== targetSdk ====="
          grep -R "targetSdk" android/

      # =========================
      # Build APK
      # =========================
      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          flutter build apk --release

      # =========================
      # Upload Release
      # =========================
      - name: Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # Google Auth
      # =========================
      - name: Authenticate Google
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_CREDENTIALS }}'

      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v2

      # =========================
      # Install jq
      # =========================
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # =========================
      # Firebase Remote Config
      # =========================
      # =========================
      # Firebase Remote Config
      # =========================
      - name: Update Firebase Remote Config
        shell: bash
        env:
          # গিটহাব থেকে সরাসরি ভার্সন নেম নিচ্ছি
          VERSION_NAME: ${{ github.ref_name }}
        run: |
          set -e

          # আপনার প্রজেক্ট আইডি
          PROJECT_ID="memoiros-app"
          
          # ভার্সন ক্লিন করা (v1.0.0 থেকে 1.0.0)
          VERSION="${VERSION_NAME#v}"
          
          # ডাইনামিক APK URL
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/app-release.apk"

          echo "Updating Firebase for Version: $VERSION"
          
          ACCESS_TOKEN=$(gcloud auth print-access-token)

          # কনফিগ ডাউনলোড করা
          curl -s \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Accept-Encoding: gzip" \
            --compressed \
            "https://firebaseremoteconfig.googleapis.com/v1/projects/$PROJECT_ID/remoteConfig" \
            -o config.json \
            -D headers.txt

          # ETag সংগ্রহ
          ETAG=$(grep -i '^etag:' headers.txt | awk '{print $2}' | tr -d '\r')

          # JQ দিয়ে JSON মডিফাই করা (এই অংশটি আপনার আগের কোডে ভুল ছিল)
          jq --arg ver "$VERSION" \
             --arg url "$APK_URL" \
             '.parameters.latest_version.defaultValue.value = $ver | 
              .parameters.apk_url.defaultValue.value = $url' \
             config.json > updated_config.json

          # আপডেট পুশ করা
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json; charset=UTF-8" \
            -H "If-Match: $ETAG" \
            -d @updated_config.json \
            "https://firebaseremoteconfig.googleapis.com/v1/projects/$PROJECT_ID/remoteConfig")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to update Firebase! HTTP Code: $HTTP_CODE"
            cat response.json
            exit 1
          fi

          echo "Successfully updated Remote Config to version $VERSION"
